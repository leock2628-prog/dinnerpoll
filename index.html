<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>聚餐選日</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --border: rgba(60,50,30,0.12);
  --border2: rgba(60,50,30,0.22);
  --text: #1e1a12;
  --text2: #6b6456;
  --text3: #b0a898;
  --accent: #c9622a;
  --accent-light: #fdf0e8;
  --accent-border: rgba(201,98,42,0.3);
  --green-bg: #eaf4e2;
  --green-text: #3a6b1a;
  --green-border: rgba(58,107,26,0.3);
  --selected-bg: #fde8d8;
  --selected-text: #a34a1a;
  --danger: #b03030;
  --radius: 8px;
  --radius-lg: 14px;
  --shadow: 0 2px 12px rgba(60,40,10,0.08);
}

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.app { max-width: 720px; margin: 0 auto; padding: 2rem 1rem 4rem; }
.page { display: none; }
.page.active { display: block; }

.app-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 2rem;
}
.app-logo {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--accent); display: flex; align-items: center;
  justify-content: center; font-size: 20px; flex-shrink: 0;
}
.app-title { font-size: 22px; font-weight: 700; letter-spacing: -.5px; }
.app-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }

h2 { font-size: 12px; font-weight: 700; letter-spacing: .8px; color: var(--text3); text-transform: uppercase; margin-bottom: .75rem; }
h3 { font-size: 16px; font-weight: 500; margin-bottom: .75rem; }

.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow);
}

.btn {
  background: transparent;
  border: 0.5px solid var(--border2);
  border-radius: var(--radius);
  padding: 9px 20px;
  font-size: 14px;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  color: var(--text);
  transition: background .15s, transform .1s;
  font-weight: 500;
}
.btn:hover { background: var(--surface2); }
.btn:active { transform: scale(.98); }
.btn-accent {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.btn-accent:hover { background: #b5541f; }
.btn-sm { padding: 6px 14px; font-size: 13px; }

input[type=text] {
  width: 100%;
  padding: 10px 14px;
  border: 0.5px solid var(--border2);
  border-radius: var(--radius);
  font-size: 15px;
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--surface);
  color: var(--text);
  transition: border-color .15s, box-shadow .15s;
}
input[type=text]:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-border);
}

.flex-row { display: flex; gap: .75rem; align-items: center; flex-wrap: wrap; }
.divider { height: 0.5px; background: var(--border); margin: 1rem 0; }

.tag {
  display: inline-flex; align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
}
.tag-slot { background: var(--surface2); color: var(--text2); border: 0.5px solid var(--border); }
.tag-sel  { background: var(--selected-bg); color: var(--selected-text); }

.badge-green {
  background: var(--green-bg);
  color: var(--green-text);
  border: 0.5px solid var(--green-border);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 13px;
  font-weight: 500;
}

.person-entry {
  display: flex; align-items: flex-start; gap: 12px;
  padding: .65rem 0;
  border-bottom: 0.5px solid var(--border);
  flex-wrap: wrap;
}
.person-entry:last-child { border-bottom: none; }
.person-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--accent-light);
  color: var(--accent);
  font-size: 13px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.person-name { font-weight: 500; font-size: 14px; min-width: 70px; padding-top: 6px; }
.slots-wrap { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; padding-top: 4px; }

.month-section { margin-bottom: 1.5rem; }
.month-label {
  font-size: 12px; font-weight: 700; letter-spacing: .8px;
  color: var(--text3); text-transform: uppercase;
  margin-bottom: .6rem; padding-bottom: .4rem;
  border-bottom: 0.5px solid var(--border);
}
.week-row { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 4px; }
.day-header { text-align: center; font-size: 11px; color: var(--text3); padding: 4px 0; font-weight: 500; }

.day-cell {
  border-radius: var(--radius);
  overflow: hidden;
  min-height: 58px;
  border: 0.5px solid var(--border);
  transition: border-color .15s;
}
.day-cell.empty { border: none; background: transparent; }
.day-cell.disabled { background: var(--bg); opacity: .5; }
.day-cell.weekend { background: var(--surface); }
.day-cell.weekend:hover { border-color: var(--border2); }
.day-cell.has-sel { border-color: var(--accent) !important; }

.day-num { font-size: 12px; font-weight: 500; padding: 5px 7px; color: var(--text); }
.day-cell.disabled .day-num { color: var(--text3); }

.slot-btn {
  display: block; width: 100%;
  border: none; border-top: 0.5px solid var(--border);
  padding: 4px 2px;
  font-size: 10px; font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer; background: transparent; color: var(--text2);
  transition: background .1s; text-align: center; font-weight: 500;
}
.slot-btn:hover { background: var(--accent-light); color: var(--accent); }
.slot-btn.selected { background: var(--accent); color: white; }
.slot-btn.selected:hover { background: #b5541f; }

.sel-summary { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; margin-top: .5rem; }
.common-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.empty-msg { color: var(--text3); font-size: 13px; font-style: italic; }
.error-msg { color: var(--danger); font-size: 13px; margin-top: 6px; }
.hint { font-size: 13px; color: var(--text2); margin-bottom: 1rem; line-height: 1.7; }

.home-banner {
  background: var(--green-bg);
  border: 0.5px solid var(--green-border);
  color: var(--green-text);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 14px;
  margin-bottom: 1rem;
  font-weight: 500;
  display: none;
}

.loading-overlay {
  position: fixed; inset: 0;
  background: rgba(247,245,240,0.88);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; z-index: 100;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--text2); }

@media (max-width: 480px) {
  .slot-btn { font-size: 9px; }
  .day-num { font-size: 11px; padding: 4px 5px; }
  .card { padding: 1rem; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">載入中...</div>
</div>

<div class="app">

  <!-- HOME -->
  <div id="page-home" class="page">
    <div class="app-header">
      <div class="app-logo">🗓</div>
      <div>
        <div class="app-title">聚餐選日</div>
        <div class="app-sub">2025 年六、七月假日時段選擇</div>
      </div>
    </div>

    <div id="home-banner" class="home-banner">✓ 已儲存！所有人都能看到你的選擇。</div>

    <div class="card">
      <h2>我要填寫</h2>
      <div class="flex-row">
        <input type="text" id="name-input" placeholder="輸入您的姓名" style="flex:1;min-width:150px" />
        <button class="btn btn-accent" onclick="handleLogin()">進入 →</button>
      </div>
      <p id="login-error" class="error-msg"></p>
      <p style="font-size:12px;color:var(--text3);margin-top:8px">已填寫過？輸入相同名字即可修改</p>
    </div>

    <div class="card">
      <h2>共同可參加時段</h2>
      <div id="common-slots" class="common-wrap">
        <span class="empty-msg">尚無共同時段</span>
      </div>
    </div>

    <div class="card">
      <h2>所有人的選擇</h2>
      <div id="all-persons-list">
        <span class="empty-msg">尚無任何人填寫</span>
      </div>
    </div>

    <div style="text-align:center;margin-top:1.5rem">
      <button class="btn btn-sm" onclick="refreshHome()">↻ 重新整理</button>
      <p style="font-size:11px;color:var(--text3);margin-top:6px">資料儲存於 Firebase 雲端，所有人即時共享</p>
    </div>
  </div>

  <!-- PICKER -->
  <div id="page-picker" class="page">
    <div class="flex-row" style="margin-bottom:1.25rem">
      <button class="btn btn-sm" onclick="goHome()">← 返回</button>
      <span id="picker-title" style="font-size:16px;font-weight:500;flex:1"></span>
    </div>

    <div class="card">
      <p class="hint">
        僅開放六、日；每格提供 <strong>午餐</strong> 與 <strong>晚餐</strong> 可複選。<br>
        <span style="display:inline-block;background:var(--accent);color:white;padding:1px 8px;border-radius:4px;font-size:11px;margin-top:4px">橘色</span> = 已選取
      </p>
      <div id="calendars"></div>
    </div>

    <div class="card">
      <h3>已選時段</h3>
      <div id="sel-summary" class="sel-summary">
        <span class="empty-msg">尚未選擇任何時段</span>
      </div>
      <div class="divider"></div>
      <div class="flex-row">
        <button class="btn btn-accent" onclick="saveSelection()">確認送出</button>
        <button class="btn btn-sm" onclick="clearSelection()">清除全部</button>
      </div>
    </div>
  </div>

</div>

<script>
/* ══════════════════════════════════════════
   Firebase Realtime Database REST API
   不需要 SDK，直接用 fetch + .json 端點
══════════════════════════════════════════ */
const DB_URL      = 'https://dinner-poll-90092-default-rtdb.firebaseio.com';
const MONTHS      = [{year:2025,month:6},{year:2025,month:7}];
const SLOT_LABELS = {lunch:'午餐', dinner:'晚餐'};

let currentUser    = '';
let userSelections = {};
let cloudDB        = {};

/* ── Firebase REST ── */
async function loadDB() {
  const res = await fetch(`${DB_URL}/selections.json`);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  cloudDB = data || {};
}

async function saveUser(name, slots) {
  // PATCH 只更新該使用者，不影響其他人
  const res = await fetch(`${DB_URL}/selections.json`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ [name]: slots })
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  // 重新讀取最新完整資料
  await loadDB();
}

/* ── Init ── */
(async function init() {
  try {
    await loadDB();
    renderHome();
    showPage('page-home');
  } catch(e) {
    alert('無法連線 Firebase，請確認網路後重新整理。\n' + e.message);
  }
  hideLoading();
})();

/* ── Navigation ── */
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function showLoading(msg) {
  document.getElementById('loading-text').textContent = msg || '載入中...';
  document.getElementById('loading-overlay').style.display = 'flex';
}
function hideLoading() {
  document.getElementById('loading-overlay').style.display = 'none';
}

/* ── Home ── */
async function refreshHome() {
  showLoading('更新資料中...');
  try { await loadDB(); renderHome(); }
  catch(e) { alert('更新失敗：' + e.message); }
  hideLoading();
}

function renderHome() {
  renderPersonList();
  renderCommon();
}

function renderPersonList() {
  const list = document.getElementById('all-persons-list');
  const persons = Object.keys(cloudDB);
  if (!persons.length) { list.innerHTML = '<span class="empty-msg">尚無任何人填寫</span>'; return; }
  list.innerHTML = '';
  persons.forEach(name => {
    const slots = cloudDB[name] || {};
    const keys = Object.keys(slots).sort();
    const row = document.createElement('div');
    row.className = 'person-entry';

    const av = document.createElement('div');
    av.className = 'person-avatar';
    av.textContent = name.slice(0,1);
    row.appendChild(av);

    const nm = document.createElement('div');
    nm.className = 'person-name';
    nm.textContent = name;
    row.appendChild(nm);

    const sw = document.createElement('div');
    sw.className = 'slots-wrap';
    if (!keys.length) {
      sw.innerHTML = '<span style="font-size:12px;color:var(--text3)">無選擇</span>';
    } else {
      keys.forEach(k => {
        const [ds, slot] = k.split('_');
        const t = document.createElement('span');
        t.className = 'tag tag-slot';
        t.textContent = fmtLabel(ds, slot);
        sw.appendChild(t);
      });
    }
    row.appendChild(sw);
    list.appendChild(row);
  });
}

function renderCommon() {
  const wrap = document.getElementById('common-slots');
  const persons = Object.keys(cloudDB);
  if (persons.length < 2) {
    wrap.innerHTML = '<span class="empty-msg">需要兩人以上才能計算共同時段</span>';
    return;
  }
  const sets = persons.map(p => new Set(Object.keys(cloudDB[p] || {})));
  let common = new Set(sets[0]);
  for (let i = 1; i < sets.length; i++) common = new Set([...common].filter(k => sets[i].has(k)));
  const arr = [...common].sort();
  if (!arr.length) { wrap.innerHTML = '<span class="empty-msg">目前沒有共同可參加的時段</span>'; return; }
  wrap.innerHTML = '';
  arr.forEach(k => {
    const [ds, slot] = k.split('_');
    const b = document.createElement('span');
    b.className = 'badge-green';
    b.textContent = fmtLabel(ds, slot);
    wrap.appendChild(b);
  });
}

/* ── Login ── */
function handleLogin() {
  const name = document.getElementById('name-input').value.trim();
  const err  = document.getElementById('login-error');
  if (!name) { err.textContent = '請輸入姓名'; return; }
  err.textContent = '';
  currentUser    = name;
  userSelections = cloudDB[name] ? JSON.parse(JSON.stringify(cloudDB[name])) : {};
  buildCalendars();
  renderSummary();
  document.getElementById('picker-title').textContent = name + ' 的選擇';
  showPage('page-picker');
}

async function goHome() {
  showLoading('載入資料...');
  try { await loadDB(); } catch(e) {}
  renderHome();
  document.getElementById('name-input').value = '';
  document.getElementById('home-banner').style.display = 'none';
  hideLoading();
  showPage('page-home');
}

/* ── Save ── */
async function saveSelection() {
  showLoading('儲存中...');
  try {
    await saveUser(currentUser, userSelections);
    renderHome();
    document.getElementById('name-input').value = '';
    const banner = document.getElementById('home-banner');
    banner.style.display = 'block';
    setTimeout(() => banner.style.display = 'none', 5000);
    showPage('page-home');
  } catch(e) {
    alert('儲存失敗：' + e.message);
  }
  hideLoading();
}

function clearSelection() {
  userSelections = {};
  document.querySelectorAll('.slot-btn.selected').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.day-cell.has-sel').forEach(c => c.classList.remove('has-sel'));
  renderSummary();
}

/* ── Calendar ── */
function fmtDate(y,m,d) { return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function fmtLabel(ds,slot) { const[,m,d]=ds.split('-'); return `${+m}/${+d} ${SLOT_LABELS[slot]}`; }
function isWeekend(y,m,d) { const w=new Date(y,m-1,d).getDay(); return w===0||w===6; }
function daysInMonth(y,m) { return new Date(y,m,0).getDate(); }
function firstDOW(y,m)    { return new Date(y,m-1,1).getDay(); }

function buildCalendars() {
  const cal = document.getElementById('calendars');
  cal.innerHTML = '';
  const mnames = {6:'六月 June', 7:'七月 July'};
  MONTHS.forEach(({year,month}) => {
    const sec = document.createElement('div');
    sec.className = 'month-section';
    sec.innerHTML = `<div class="month-label">${year} · ${mnames[month]}</div>`;
    const grid = document.createElement('div');

    const hw = document.createElement('div');
    hw.className = 'week-row';
    ['日','一','二','三','四','五','六'].forEach((h,i) => {
      const hd = document.createElement('div');
      hd.className = 'day-header';
      hd.style.color = (i===0||i===6) ? 'var(--accent)' : '';
      hd.textContent = h;
      hw.appendChild(hd);
    });
    grid.appendChild(hw);

    const fd=firstDOW(year,month), days=daysInMonth(year,month);
    let row=document.createElement('div'); row.className='week-row';
    for(let e=0;e<fd;e++){const c=document.createElement('div');c.className='day-cell empty';row.appendChild(c);}

    for(let d=1;d<=days;d++){
      const col=(fd+d-1)%7;
      if(col===0&&d>1){grid.appendChild(row);row=document.createElement('div');row.className='week-row';}
      const cell=document.createElement('div');
      const ds=fmtDate(year,month,d);
      if(isWeekend(year,month,d)){
        const hasAny=['lunch','dinner'].some(s=>userSelections[`${ds}_${s}`]);
        cell.className='day-cell weekend'+(hasAny?' has-sel':'');
        const dn=document.createElement('div');dn.className='day-num';dn.textContent=d;cell.appendChild(dn);
        ['lunch','dinner'].forEach(slot=>{
          const key=`${ds}_${slot}`;
          const sb=document.createElement('button');
          sb.className='slot-btn'+(userSelections[key]?' selected':'');
          sb.textContent=SLOT_LABELS[slot];
          sb.onclick=()=>toggleSlot(key,sb,cell,ds);
          cell.appendChild(sb);
        });
      }else{
        cell.className='day-cell disabled';
        const dn=document.createElement('div');dn.className='day-num';dn.textContent=d;cell.appendChild(dn);
      }
      row.appendChild(cell);
    }
    const lc=(fd+days-1)%7;
    if(lc<6)for(let i=lc+1;i<=6;i++){const c=document.createElement('div');c.className='day-cell empty';row.appendChild(c);}
    grid.appendChild(row);
    sec.appendChild(grid);
    cal.appendChild(sec);
  });
}

function toggleSlot(key,btn,cell,ds){
  if(userSelections[key]){delete userSelections[key];btn.classList.remove('selected');}
  else{userSelections[key]=true;btn.classList.add('selected');}
  cell.classList.toggle('has-sel',['lunch','dinner'].some(s=>userSelections[`${ds}_${s}`]));
  renderSummary();
}

function renderSummary(){
  const wrap=document.getElementById('sel-summary');
  const keys=Object.keys(userSelections);
  if(!keys.length){wrap.innerHTML='<span class="empty-msg">尚未選擇任何時段</span>';return;}
  wrap.innerHTML='';
  keys.sort().forEach(k=>{
    const[ds,slot]=k.split('_');
    const t=document.createElement('span');t.className='tag tag-sel';t.textContent=fmtLabel(ds,slot);
    wrap.appendChild(t);
  });
}

document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin();});
</script>
</body>
</html>
